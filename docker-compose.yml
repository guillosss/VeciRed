version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=vecired
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=vecired_secret_key_2026
      - CLOUDINARY_CLOUD_NAME=dlpt5gplu
      - CLOUDINARY_API_KEY=466423647793587
      - CLOUDINARY_API_SECRET=tu_api_secret
      - PORT=3000
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=vecired
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: